name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Avoid Node 20 deprecation noise from older action runtimes
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  desktop-windows:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          # Workspace root Cargo.toml → binaries land in ./target
          workspaces: ". -> target"

      - name: Fetch bundled ViGEm redist (DLL + driver setup)
        shell: pwsh
        run: pwsh -ExecutionPolicy Bypass -File tools/fetch-vigem-redist.ps1

      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm ci

      - name: Typecheck + frontend build
        working-directory: apps/desktop
        run: npm run build

      - name: Cargo test (workspace)
        run: cargo test --workspace

      - name: Tauri build (NSIS + exe)
        working-directory: apps/desktop
        run: npm run tauri build

      # Monorepo workspace puts cargo/tauri output under REPO/target, not src-tauri/target
      - name: Locate build outputs
        shell: pwsh
        run: |
          Write-Host "=== Looking for lanplay.exe ==="
          Get-ChildItem -Path . -Recurse -Filter "lanplay.exe" -ErrorAction SilentlyContinue |
            Select-Object -ExpandProperty FullName
          Write-Host "=== Looking for NSIS installers ==="
          Get-ChildItem -Path . -Recurse -Filter "*setup*.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'bundle|nsis|release' } |
            Select-Object -ExpandProperty FullName
          Write-Host "=== target/release (if any) ==="
          if (Test-Path "target/release") {
            Get-ChildItem "target/release" -ErrorAction SilentlyContinue | Select-Object Name
          }
          if (Test-Path "apps/desktop/src-tauri/target/release") {
            Get-ChildItem "apps/desktop/src-tauri/target/release" -ErrorAction SilentlyContinue | Select-Object Name
          }

      - name: Upload LANPlay Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lanplay-windows
          # Workspace target is the real location for this monorepo
          path: |
            target/release/lanplay.exe
            target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/lanplay.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
