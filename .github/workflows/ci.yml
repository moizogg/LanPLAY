name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      full_installer:
        description: "Also build NSIS setup.exe (slower)"
        type: boolean
        default: false
      run_tests:
        description: "Run cargo test in debug (slow — second full compile)"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "true"
  RUSTFLAGS: "-C debuginfo=0"

jobs:
  desktop-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    permissions:
      contents: write  # publish rolling nightly release for in-app updater

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache (workspace target/)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: "lanplay-win-release-static-vigem"
          cache-all-crates: true
          cache-on-failure: true

      - name: Cache ViGEmBus installer
        id: cache-vigem
        uses: actions/cache@v4
        with:
          path: apps/desktop/src-tauri/resources/vigem
          key: vigem-setup-v3-${{ hashFiles('tools/fetch-vigem-redist.ps1') }}

      - name: Fetch ViGEmBus setup
        if: steps.cache-vigem.outputs.cache-hit != 'true'
        shell: pwsh
        run: pwsh -ExecutionPolicy Bypass -File tools/fetch-vigem-redist.ps1

      - name: Ensure ViGEmBus setup exists
        shell: pwsh
        run: |
          $setup = Get-ChildItem "apps/desktop/src-tauri/resources/vigem" -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match 'ViGEmBus|Setup' -and ($_.Extension -eq '.exe' -or $_.Extension -eq '.msi') }
          if (-not $setup) {
            Write-Host "Setup missing — re-fetching..."
            pwsh -ExecutionPolicy Bypass -File tools/fetch-vigem-redist.ps1
          }
          if (-not (Test-Path "apps/desktop/src-tauri/resources/vigem/ViGEmBus_Setup.exe") -and
              -not (Test-Path "apps/desktop/src-tauri/resources/vigem/ViGEmBus_Setup.msi")) {
            throw "ViGEmBus setup still missing"
          }
          # Vendored C++ client must exist for static link
          if (-not (Test-Path "third-party/ViGEmClient/src/ViGEmClient.cpp")) {
            throw "third-party/ViGEmClient missing — commit vendored sources"
          }
          Get-ChildItem "apps/desktop/src-tauri/resources/vigem" | Format-Table Name, Length

      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm ci

      - name: Cargo test (optional, slow)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_tests == true }}
        run: cargo test --workspace

      - name: Tauri build (exe only)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.full_installer != true }}
        working-directory: apps/desktop
        run: npm run tauri build -- --no-bundle --ci

      - name: Tauri build (exe + NSIS installer)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_installer == true }}
        working-directory: apps/desktop
        run: npm run tauri build -- --ci

      - name: Assemble portable package
        shell: pwsh
        run: |
          $exe = $null
          foreach ($p in @(
            "target\release\lanplay.exe",
            "apps\desktop\src-tauri\target\release\lanplay.exe"
          )) {
            if (Test-Path $p) { $exe = (Resolve-Path $p).Path; break }
          }
          if (-not $exe) {
            $exe = (Get-ChildItem -Path . -Recurse -Filter "lanplay.exe" -ErrorAction SilentlyContinue |
              Select-Object -First 1 -ExpandProperty FullName)
          }
          if (-not $exe) { throw "lanplay.exe not found after build" }
          Write-Host "Using exe: $exe"

          $out = "dist\lanplay-portable"
          if (Test-Path $out) { Remove-Item -Recurse -Force $out }
          New-Item -ItemType Directory -Force -Path "$out\vigem" | Out-Null

          Copy-Item -Force $exe "$out\lanplay.exe"
          Copy-Item -Force -Recurse "apps\desktop\src-tauri\resources\vigem\*" "$out\vigem\" -ErrorAction Stop

          $setup = Get-ChildItem "$out\vigem" | Where-Object {
            $_.Name -match 'ViGEmBus' -and ($_.Extension -eq '.exe' -or $_.Extension -eq '.msi')
          } | Select-Object -First 1
          if ($setup -and $setup.Extension -eq '.exe' -and $setup.Name -ne 'ViGEmBus_Setup.exe') {
            Copy-Item -Force $setup.FullName "$out\vigem\ViGEmBus_Setup.exe"
          }
          if ($setup -and $setup.Extension -eq '.msi' -and $setup.Name -ne 'ViGEmBus_Setup.msi') {
            Copy-Item -Force $setup.FullName "$out\vigem\ViGEmBus_Setup.msi"
          }

          @"
          LANPlay portable package
          ========================
          1. Keep this folder together.
          2. Run lanplay.exe
          3. Host: Install gamepad support once if prompted (UAC) — only the kernel driver.
             ViGEmClient is already inside lanplay.exe (no DLL needed).
          4. Start Host / Connect with Tailscale IP

          Layout:
            lanplay.exe          (includes static ViGEmClient)
            vigem\ViGEmBus_Setup.exe
          "@ | Set-Content -Path "$out\README.txt" -Encoding UTF8

          Get-ChildItem -Recurse $out | Select-Object FullName, Length

      - name: Upload LANPlay Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lanplay-windows
          path: dist/lanplay-portable/**
          if-no-files-found: error
          retention-days: 14

      # Rolling release for in-app Update button (public download, no Actions login).
      - name: Write build-info + zip portable
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        shell: pwsh
        run: |
          $out = "dist\lanplay-portable"
          $sha = $env:GITHUB_SHA
          $short = $sha.Substring(0, [Math]::Min(12, $sha.Length))
          @"
          {
            "sha": "$sha",
            "shortSha": "$short",
            "builtAt": "$(Get-Date -Format o)",
            "runId": "${{ github.run_id }}"
          }
          "@ | Set-Content -Path "$out\build-info.json" -Encoding UTF8
          "Commit: $sha" | Set-Content -Path "$out\BUILD_INFO.txt" -Encoding UTF8
          $zip = "dist\lanplay-windows-nightly.zip"
          if (Test-Path $zip) { Remove-Item -Force $zip }
          Compress-Archive -Path "$out\*" -DestinationPath $zip -Force
          # Also name with sha for clarity in release assets list
          Copy-Item -Force $zip "dist\lanplay-windows-$short.zip"
          Get-Item dist\lanplay-windows-*.zip | Format-Table Name, Length

      - name: Publish nightly release (in-app updater)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: LANPlay Nightly
          prerelease: true
          generate_release_notes: false
          body: |
            Rolling build for the in-app **Update** button.

            Commit: ${{ github.sha }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Download `lanplay-windows-nightly.zip`, unzip, run `lanplay.exe`.
            Or open LANPlay → **Update** to install automatically.
          files: dist/lanplay-windows-nightly.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
