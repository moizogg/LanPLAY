name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      full_installer:
        description: "Also build NSIS setup.exe (slower)"
        type: boolean
        default: false
      run_tests:
        description: "Run cargo test in debug (slow — second full compile)"
        type: boolean
        default: false

# Node 24 for JS actions; fewer deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "true"
  # Fewer codegen units = slightly slower first build, better cache reuse? keep default.
  RUSTFLAGS: "-C debuginfo=0"

jobs:
  desktop-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    # One runner, one release compile (not debug+release)

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Biggest time saver after first green run
      - name: Rust cache (workspace target/)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: "lanplay-win-release"
          cache-all-crates: true
          # Save even on failure so partial compiles help next run
          cache-on-failure: true

      # Skip re-cloning/building ViGEm when hash of script unchanged
      - name: Cache ViGEm redist
        id: cache-vigem
        uses: actions/cache@v4
        with:
          path: apps/desktop/src-tauri/resources/vigem
          key: vigem-redist-${{ hashFiles('tools/fetch-vigem-redist.ps1') }}

      - name: Fetch ViGEm redist
        if: steps.cache-vigem.outputs.cache-hit != 'true'
        shell: pwsh
        run: pwsh -ExecutionPolicy Bypass -File tools/fetch-vigem-redist.ps1

      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm ci

      # NOTE: do NOT run a separate `cargo test` by default.
      # That compiles the whole workspace in *debug*, then tauri builds *release*
      # again = ~2× the wait. Optional via workflow_dispatch.
      - name: Cargo test (optional, slow)
        if: ${{ inputs.run_tests == true }}
        run: cargo test --workspace

      # Single release compile. Skip NSIS unless requested (setup packaging is extra time).
      # Tauri v2: --no-bundle (NOT --bundles none; that's v1-only).
      # Frontend is built via tauri.conf beforeBuildCommand — no separate npm run build.
      - name: Tauri build (exe only)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.full_installer != true }}
        working-directory: apps/desktop
        run: npm run tauri build -- --no-bundle --ci

      - name: Tauri build (exe + NSIS installer)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_installer == true }}
        working-directory: apps/desktop
        run: npm run tauri build -- --ci

      - name: Locate build outputs
        shell: pwsh
        run: |
          $found = @()
          foreach ($p in @(
            "target\release\lanplay.exe",
            "apps\desktop\src-tauri\target\release\lanplay.exe"
          )) {
            if (Test-Path $p) {
              Write-Host "FOUND $p"
              $found += $p
            }
          }
          Get-ChildItem -Path . -Recurse -Filter "lanplay.exe" -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host "FOUND $($_.FullName)"; $found += $_.FullName }
          if ($found.Count -eq 0) { throw "lanplay.exe not found after build" }

      - name: Upload LANPlay Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lanplay-windows
          path: |
            target/release/lanplay.exe
            target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/lanplay.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/resources/vigem/ViGEmClient.dll
            apps/desktop/src-tauri/resources/vigem/ViGEmBus_Setup.exe
            apps/desktop/src-tauri/resources/vigem/ViGEmBus_Setup.msi
          if-no-files-found: error
          retention-days: 14
