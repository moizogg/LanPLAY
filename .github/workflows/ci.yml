name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch: # run manually from GitHub Actions tab

jobs:
  desktop-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> target

      - name: Install frontend deps
        run: npm ci

      - name: Typecheck + frontend build
        run: npm run build

      - name: Cargo test (workspace)
        working-directory: .
        run: cargo test --workspace

      - name: Tauri build (NSIS + exe)
        run: npm run tauri build

      - name: Upload LANPlay Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lanplay-windows
          path: |
            apps/desktop/src-tauri/target/release/lanplay.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
